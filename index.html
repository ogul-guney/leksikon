<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEKsİKON - Argo Etimoloji Sözlüğü</title>
  
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Georgia:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Georgia', 'Times New Roman', 'serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Custom Styles -->
  <style>
    body { background-color: #121212; color: #e0e0e0; }
    ::selection { background-color: #8c6b93; color: white; }
  </style>
</head>
<body class="min-h-screen font-sans flex flex-col">

  <!-- Header -->
  <header class="border-b border-[#333] bg-[#1a1a1a] sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
      
      <!-- Logo -->
      <div id="logo" class="text-3xl font-bold tracking-wider text-white cursor-pointer select-none flex flex-col items-center sm:items-start font-serif">
        <div>lek<em class="text-[#8c6b93] italic">sik</em>on</div>
      </div>
      
      <!-- Search Bar -->
      <div class="relative w-full sm:w-80">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <i data-lucide="search" class="h-4 w-4 text-gray-500"></i>
        </div>
        <input type="text" id="searchInput" placeholder="Kelime ara..." class="w-full bg-[#2a2a2a] border border-[#444] text-white rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-[#8c6b93] focus:ring-1 focus:ring-[#8c6b93] transition-colors placeholder-gray-500" autocomplete="off">
        
        <!-- Search Results Dropdown -->
        <div id="searchResults" class="hidden absolute top-full left-0 right-0 mt-2 bg-[#2a2a2a] border border-[#444] rounded-md shadow-xl overflow-hidden z-20">
          <ul id="searchResultsList" class="max-h-60 overflow-y-auto"></ul>
        </div>
      </div>

    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto px-4 py-10 flex flex-col md:flex-row gap-8 w-full flex-1">
    
    <!-- Sidebar - Word List -->
    <aside class="w-full md:w-1/4 order-2 md:order-1">
      <div class="bg-[#1a1a1a] border border-[#333] rounded-lg p-4 sticky top-28">
        <h3 class="text-xs font-sans font-semibold text-gray-500 uppercase tracking-widest mb-4 pb-2 border-b border-[#333]">Sözlükte Neler Var?</h3>
        
        <button id="randomBtn" class="w-full flex items-center justify-center gap-2 bg-[#2a2a2a] hover:bg-[#333] text-gray-300 py-2 rounded-md transition-colors mb-4 text-[11px] font-semibold tracking-[0.2em] uppercase border border-[#444]">
          <i data-lucide="shuffle" class="w-3.5 h-3.5"></i> Rastgele
        </button>

        <ul id="randomWordsList" class="space-y-1"></ul>
      </div>
    </aside>

    <!-- Dictionary Entry -->
    <article class="w-full md:w-3/4 order-1 md:order-2">
      <div id="wordContainer" class="bg-[#1a1a1a] border border-[#333] rounded-xl p-8 md:p-12 shadow-2xl">
        <!-- Content injected via JS -->
      </div>
    </article>

  </main>

  <!-- Footer -->
  <footer class="mt-auto border-t border-[#333] py-6 text-center flex flex-col items-center gap-2">
    <p class="text-sm text-gray-400 font-serif italic">
      Leksikon Argo Etimolojisi Sözlüğü
    </p>
    <p class="text-xs text-gray-600 font-sans tracking-wide">
      Oğul Güney 2026, v1.0
    </p>
  </footer>

  <!-- Application Logic -->
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Dictionary Data
    const dictionaryData = [
      {
        word: "manita",
        origin: "İtalyanca <i>mantenuta</i> \"besleme (kadın), metres\" sözcüğünden alıntıdır.",
        explanation: "Karş. Fransızca <i>maintenir</i> > İngilizce <i>maintain</i> \"bakmak, beslemek\".",
        history: "mantinota \"metres, sürekli görülen hayat kadını\" [Ahmed Mithat, 1882]."
      },
      {
        word: "fiyaka",
        origin: "İtalyanca <i>fiacca</i> \"gösteriş, çalım\" sözcüğünden alıntıdır.",
        explanation: "İtalyanca sözcük <i>fiacco</i> \"yorgun, bitkin\" sözcüğünden türetilmiştir.",
        history: "fiyaka \"gösteriş\" [Ahmet Rasim, Şehir Mektupları, 1898]."
      },
      {
        word: "arak",
        origin: "Arapça <i>ˁrq</i> kökünden gelen <i>ˁaraq</i> \"ter, damıtılmış içki\" sözcüğünden alıntıdır. Argo anlamı \"çalma, hırsızlık\".",
        explanation: "Arapça sözcük <i>ˁaraqa</i> \"terledi\" fiilinin masdarıdır.",
        history: "arak \"hırsızlık\" [Osman Cemal Kaygılı, Argo Lugati, 1932]."
      },
      {
        word: "zula",
        origin: "Bilinmeyen bir dilden alıntıdır. \"Gizli yer, saklama yeri\" anlamındadır.",
        explanation: "Kökeni kesin olarak bilinmemekle birlikte, Rumca veya İtalyanca argo kökenli olabileceği düşünülmektedir.",
        history: "zula \"gizli cep, saklanacak yer\" [Argo Sözlüğü, 1940]."
      },
      {
        word: "kıyak",
        origin: "Türkçe kökenli olduğu düşünülmektedir. \"Güzel, iyi, hoşa giden\" anlamındadır.",
        explanation: "<i>Kıy-</i> fiilinden türetilmiş olabileceği veya doğrudan argo bir türetme olduğu varsayılmaktadır.",
        history: "kıyak \"iyi, güzel\" [Hüseyin Rahmi Gürpınar, 1920]."
      },
      {
        word: "afili",
        origin: "Rumca <i>afíli</i> (αφίλι) \"gösteriş, çalım\" sözcüğünden alıntıdır.",
        explanation: "Rumca sözcük Yunanca <i>aphyllos</i> \"yapraksız\" sözcüğünden evrilmiş olabilir, ancak anlam bağı belirsizdir.",
        history: "afili \"gösterişli, fiyakalı\" [Argo Sözlüğü, 1930]."
      },
      {
        word: "racon",
        origin: "İtalyanca <i>ragione</i> \"akıl, mantık, hak, hukuk\" sözcüğünden alıntıdır.",
        explanation: "Latince <i>ratio, ration-</i> \"hesap, mantık\" sözcüğünden evrilmiştir.",
        history: "racon \"yol yordam, kural, gösteriş\" [Osman Cemal Kaygılı, 1932]."
      }
    ];

    let selectedWord = dictionaryData[0];
    let currentRandomWords = [];

    // Utility: Highlight Keywords
    function highlightKeywords(text) {
      if (!text) return '';
      let highlighted = text;
      const languages = ['İtalyanca', 'Fransızca', 'İngilizce', 'Arapça', 'Türkçe', 'Osmanlıca', 'Rumca', 'Latince', 'Yunanca'];
      
      languages.forEach(lang => {
        const regex = new RegExp(`(^|[^a-zA-ZğüşıöçĞÜŞİÖÇ])(${lang})(?=[^a-zA-ZğüşıöçĞÜŞİÖÇ]|$)`, 'g');
        highlighted = highlighted.replace(regex, `$1<span class='text-[#73937a] font-medium'>$2</span>`);
      });
      
      highlighted = highlighted.replace(/"([^"]+)"/g, "<span class='text-gray-200'>\"$1\"</span>");
      return highlighted;
    }

    // Utility: Get Random Words
    function getRandomWords(count) {
      const shuffled = [...dictionaryData].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
    }

    // Render: Main Word Entry
    function renderWord(wordObj) {
      selectedWord = wordObj;
      const container = document.getElementById('wordContainer');
      
      let html = `<h1 class="text-4xl md:text-5xl font-serif font-bold text-[#8c6b93] mb-10 capitalize tracking-tight">${wordObj.word}</h1>`;
      html += `<div class="flex flex-col gap-6 font-serif text-lg leading-relaxed text-gray-300">`;
      
      const sections = [
        { title: 'Köken', content: wordObj.origin, className: '' },
        { title: 'Ek Açıklama', content: wordObj.explanation, className: '' },
        { title: 'Literatür', content: wordObj.history, className: 'text-gray-400' }
      ].filter(s => s.content);

      sections.forEach((section, idx) => {
        if (idx > 0) html += `<hr class="w-32 border-[#333]" />`;
        html += `
          <section>
            <h2 class="text-[11px] font-sans font-semibold text-gray-500 uppercase tracking-[0.2em] mb-3 select-none">${section.title}</h2>
            <p class="${section.className}">${highlightKeywords(section.content)}</p>
          </section>
        `;
      });
      
      html += `</div>`;
      container.innerHTML = html;
      
      // Update sidebar active states
      renderRandomWords();
    }

    // Render: Sidebar Random Words
    function renderRandomWords() {
      const list = document.getElementById('randomWordsList');
      list.innerHTML = '';
      
      currentRandomWords.forEach(item => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        const isActive = selectedWord && selectedWord.word === item.word;
        
        btn.className = `text-left w-full px-3 py-2 rounded-md transition-colors text-sm font-medium ${isActive ? 'bg-[#2a2a2a] text-[#8c6b93]' : 'text-gray-400 hover:text-gray-200 hover:bg-[#2a2a2a]'}`;
        btn.textContent = item.word;
        btn.onclick = () => {
          renderWord(item);
          document.getElementById('searchInput').value = '';
          document.getElementById('searchResults').classList.add('hidden');
        };
        
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    // Event Listeners
    document.getElementById('randomBtn').addEventListener('click', () => {
      currentRandomWords = getRandomWords(4);
      renderRandomWords();
    });

    document.getElementById('logo').addEventListener('click', () => {
      renderWord(dictionaryData[0]);
    });

    // Search Logic
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchResultsList = document.getElementById('searchResultsList');

    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      if (!term) {
        searchResults.classList.add('hidden');
        return;
      }
      
      const filtered = dictionaryData.filter(item => item.word.toLowerCase().includes(term));
      searchResultsList.innerHTML = '';
      
      if (filtered.length > 0) {
        filtered.forEach(item => {
          const li = document.createElement('li');
          li.className = "px-4 py-2 hover:bg-[#3a3a3a] cursor-pointer border-b border-[#333] last:border-0 text-gray-200 transition-colors";
          li.textContent = item.word;
          li.onmousedown = () => { // mousedown fires before blur
            renderWord(item);
            searchInput.value = '';
            searchResults.classList.add('hidden');
          };
          searchResultsList.appendChild(li);
        });
      } else {
        searchResultsList.innerHTML = '<div class="px-4 py-3 text-gray-500 text-sm">Sonuç bulunamadı.</div>';
      }
      searchResults.classList.remove('hidden');
    });

    searchInput.addEventListener('focus', () => {
      if (searchInput.value) searchResults.classList.remove('hidden');
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(() => searchResults.classList.add('hidden'), 150);
    });

    // Initialization
    currentRandomWords = getRandomWords(4);
    renderWord(dictionaryData[0]);

  </script>
</body>
</html>
